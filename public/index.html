<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RefTrack - Sistema de Indicações</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <!-- App Container -->
  <div id="app-container" class="hidden">
    
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">Ref<span>Track</span></div>
        <div class="logo-subtitle">SISTEMA DE INDICAÇÕES</div>
      </div>
      <div class="sidebar-sep"></div>
      
      <nav class="sidebar-nav">
        <a href="#dashboard" class="nav-item" data-view="dashboard">Dashboard</a>
        <a href="#indicadores" class="nav-item" data-view="indicadores">Indicadores</a>
        <a href="#vendas" class="nav-item" data-view="vendas">Vendas</a>
        <a href="#webhook" class="nav-item" data-view="webhook">Webhook</a>
      </nav>

      <div class="sidebar-footer">
        <div class="avatar-admin">AD</div>
        <div class="admin-info">
          <div class="admin-name">Admin User</div>
          <div class="admin-role" onclick="logout()" style="cursor: pointer;">SAIR</div>
        </div>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
      
      <!-- Topbar -->
      <header class="topbar">
        <h1 id="page-title" class="page-title">Dashboard</h1>
        
        <div class="topbar-actions">
          <div class="webhook-badge" id="webhook-badge-top" style="display: none;">
            <div class="dot-pulse"></div>
            Novo Evento
          </div>
          <div id="topbar-action-container"></div>
        </div>
      </header>
      
      <!-- Dynamic View Container -->
      <div id="view-container" class="view-container">
        <!-- Views injected by app.js here -->
      </div>
      
    </main>

  </div>

  <!-- Login Container -->
  <div id="login-container">
    <div class="login-box">
      <div class="logo" style="font-size: 32px; text-align: center; margin-bottom: 30px;">Ref<span>Track</span></div>
      <form id="login-form">
        <div class="form-group">
          <label>Usuário</label>
          <input type="text" id="login-user" class="form-input" required>
        </div>
        <div class="form-group" style="margin-top: 15px;">
          <label>Senha</label>
          <input type="password" id="login-pass" class="form-input" required>
        </div>
        <button type="submit" class="btn-primary" style="width: 100%; margin-top: 25px;">ENTRAR</button>
      </form>
      <div id="login-error" style="color: var(--danger); font-family: DM Mono; font-size: 11px; margin-top: 10px; text-align: center;"></div>
    </div>
  </div>

  <!-- Global Modal Container -->
  <div id="modal-overlay" class="modal-overlay" style="display: none;">
    <div class="modal" id="modal-content">
      <!-- injected by app.js -->
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- Scripts -->
  <script src="/app.js"></script>
</body>
</html>
